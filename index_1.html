<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图表演示</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #292929;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
    }

    .page {
      width: 375px;
      height: 812px;
      position: relative;
      overflow: hidden;
      background: #ffffff;
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
    }

    .screen.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .forecast {
      position: absolute;
      top: 285px;
      left: 50%;
      width: 303px;
      transform: translateX(-50%);
    }

    .forecast-panel {
      position: relative;
      width: 303px;
      height: 140px;
      padding: 0;
      background: #f2f2f5;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
    }

    .title {
      position: absolute;
      top: 8px;
      left: 8px;
      z-index: 2;
      margin: 0;
      color: #353535;
      font-size: 17px;
      font-weight: 500;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .calendar {
      position: absolute;
      left: 0;
      bottom: 0;
      z-index: 1;
      width: 303px;
      height: 140px;
      background: transparent;
    }

    .calendar-inner {
      position: relative;
      display: flex;
      justify-content: center;
      gap: 4px;
      width: 100%;
      height: 100%;
      padding-top: 48px;
    }

    .card {
      position: relative;
      width: 85px;
      height: 76px;
      overflow: visible;
      transform-style: preserve-3d;
      perspective: 900px;
      --flip-half-duration: 150ms;
    }

    .card-shadow {
      position: absolute;
      top: -7px;
      left: 50%;
      width: 105px;
      height: 96px;
      background: url("./切图/阴影.png?v=1784355470") no-repeat top left / 100% 100%;
      transform: translateX(-50%);
      z-index: 0;
      pointer-events: none;
    }

    .card-value {
      position: absolute;
      left: 0;
      top: 0;
      width: 85px;
      height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eb5f94;
      font-weight: 700;
      letter-spacing: -2px;
      z-index: 2;
    }

    .card-value.number {
      font-size: 44px;
    }

    .card-value.week {
      font-size: 32px;
      letter-spacing: -1px;
    }

    .suffix {
      margin-left: 2px;
      align-self: flex-end;
      padding-bottom: 21px;
      font-size: 13px;
      letter-spacing: 0;
    }

    .value-main {
      display: inline-block;
    }

    .card-top,
    .card-bottom {
      position: absolute;
      left: 0;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      transform-origin: top left;
      transform: scale(0.3333333);
    }

    .card-top {
      top: 0;
      width: 255px;
      height: 108px;
      background-image: url("./切图/上半页.png?v=1784515428");
    }

    .card-bottom {
      top: 36px;
      width: 255px;
      height: 108px;
      background-image: url("./切图/下半页.png?v=1784515428");
    }

    .card-depth {
      position: absolute;
      left: 0;
      top: 56px;
      width: 255px;
      height: 60px;
      background: url("./切图/底部高度.png?v=1784515428") no-repeat top left / 100% 100%;
      transform-origin: top left;
      transform: scale(0.3333333);
    }

    .hinge-left,
    .hinge-right {
      position: absolute;
      top: 29px;
      width: 11px;
      height: 45px;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      background-image: url("./切图/金属轴.png?v=1784279373");
      transform-origin: top left;
      z-index: 3;
    }

    .hinge-left {
      left: 0;
      transform: scale(0.3333333);
    }

    .hinge-right {
      right: 4px;
      transform-origin: top right;
      transform: scale(-0.3333333, 0.3333333);
    }

    .card-seam {
      position: absolute;
      left: 0;
      top: 35.5px;
      width: 85px;
      height: 0.5px;
      background: rgba(0, 0, 0, 0.2);
      z-index: 3;
      pointer-events: none;
    }

    .flip-top,
    .flip-bottom {
      position: absolute;
      left: 0;
      width: 85px;
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      z-index: 4;
      backface-visibility: hidden;
    }

    .flip-top {
      top: 0;
      height: 36px;
      transform-origin: center bottom;
    }

    .flip-bottom {
      top: 36px;
      height: 40px;
      transform-origin: center top;
      transform: rotateX(90deg);
    }

    .flip-top .card-top,
    .flip-bottom .card-bottom {
      z-index: 0;
    }

    .flip-bottom .card-bottom {
      top: 0;
    }

    .flip-top::after,
    .flip-bottom::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .flip-top::after {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.02) 0%, rgba(0, 0, 0, 0.18) 100%);
      transform-origin: center bottom;
    }

    .flip-bottom::after {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.16) 0%, rgba(255, 255, 255, 0.02) 100%);
      transform-origin: center top;
    }

    .flip-top .card-value,
    .flip-bottom .card-value {
      z-index: 1;
    }

    .flip-bottom .card-value {
      top: -36px;
    }

    .card.is-flipping .flip-top,
    .card.is-flipping .flip-bottom {
      opacity: 1;
    }

    .card.is-flipping .flip-top {
      animation: flipTop var(--flip-half-duration) cubic-bezier(0.38, 0.02, 0.7, 0.28) forwards;
    }

    .card.is-flipping .flip-bottom {
      animation: flipBottom var(--flip-half-duration) cubic-bezier(0.2, 0.75, 0.28, 1) var(--flip-half-duration) forwards;
    }

    .card.is-flipping .flip-top::after {
      animation: topShade var(--flip-half-duration) ease-out forwards;
    }

    .card.is-flipping .flip-bottom::after {
      animation: bottomShade var(--flip-half-duration) ease-out var(--flip-half-duration) forwards;
    }

    .card.is-flipping .card-shadow {
      animation: cardShadowPulse calc(var(--flip-half-duration) * 2) ease-out forwards;
    }

    .play-button,
    .switch-button {
      position: absolute;
      width: 136px;
      height: 48px;
      border-radius: 24px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transform: translateX(-50%);
      cursor: pointer;
    }

    .play-button {
      left: 50%;
      bottom: 36px;
      border: 0;
      background: linear-gradient(180deg, #ff7bac 0%, #eb5f94 100%);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(235, 95, 148, 0.25);
    }

    .play-button:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .switch-button {
      position: static;
      border: 1px solid rgba(235, 95, 148, 0.18);
      background: #ffffff;
      color: #eb5f94;
      box-shadow: 0 12px 24px rgba(235, 95, 148, 0.08);
      transform: none;
    }

    .pager {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 20px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      align-items: center;
      min-height: 32px;
      z-index: 10;
    }

    .pager-button {
      min-width: 72px;
      height: 32px;
      padding: 0 14px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0;
      box-shadow: none;
    }

    .pager-button.is-active {
      background: linear-gradient(180deg, #ff7bac 0%, #eb5f94 100%);
      color: #ffffff;
      border-color: transparent;
      box-shadow: 0 8px 18px rgba(235, 95, 148, 0.16);
    }

    .signal {
      position: absolute;
      top: 286px;
      left: 50%;
      width: 304px;
      transform: translateX(-50%);
    }

    .signal-panel {
      position: relative;
      width: 304px;
      height: 152px;
      padding: 13px 12px 14px;
      background: #f2f2f5;
      border-radius: 12px;
    }

    .signal-title {
      position: absolute;
      top: 8px;
      left: 8px;
      margin: 0;
      color: #353535;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .signal-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 2px;
      padding-top: 32px;
    }

    .signal-item {
      text-align: center;
    }

    .signal-light {
      position: relative;
      width: 36px;
      height: 36px;
      margin: 0 auto 11px;
    }

    .signal-light-off,
    .signal-light-on {
      position: absolute;
      inset: 0;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      transition:
        opacity 220ms ease,
        filter 260ms ease;
    }

    .signal-light-off {
      opacity: 1;
    }

    .signal-light-on {
      opacity: 0;
      filter: saturate(0.72) brightness(0.9);
    }

    .signal-name {
      color: #353535;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.25;
      transform: translateY(-2px);
    }

    .signal-item.is-dim .signal-name,
    .signal-item.is-dim .signal-meta {
      color: #cccccc;
    }

    .signal-meta {
      margin-top: 6px;
      color: #999999;
      font-size: 11px;
      line-height: 1.45;
      transform: translateY(-4px);
    }

    .signal-item.is-dim .signal-light-on {
      opacity: 0;
      animation: signalFadeOut 400ms ease-out;
    }

    .signal-item.is-active .signal-light-on {
      opacity: 1;
      filter: saturate(1.04) brightness(1.04);
      animation: signalFadeIn 400ms ease-out;
    }

    .signal-controls {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .signal-reset-row,
    .signal-color-row {
      display: grid;
      gap: 10px;
    }

    .signal-reset-row {
      grid-template-columns: 72px;
      justify-content: center;
    }

    .signal-color-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .signal-control {
      height: 42px;
      border: 0;
      border-radius: 21px;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        opacity 180ms ease;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
    }

    .signal-control[data-signal="stable"] {
      background: linear-gradient(180deg, #67e69b 0%, #39cc7c 100%);
    }

    .signal-control[data-signal="mild"] {
      background: linear-gradient(180deg, #ffd85d 0%, #ffbe2f 100%);
    }

    .signal-control[data-signal="strong"] {
      background: linear-gradient(180deg, #ff9b4e 0%, #ff6d2e 100%);
    }

    .signal-control[data-signal="watch"] {
      background: linear-gradient(180deg, #d98cff 0%, #b95bff 100%);
    }

    .signal-control[data-signal="off"] {
      background: linear-gradient(180deg, #d5d5d5 0%, #adadad 100%);
    }

    .signal-control.is-active {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
      transform: translateY(-1px);
    }

    .signal-control:active {
      transform: translateY(0);
    }

    @keyframes flipTop {
      from {
        transform: rotateX(0deg) translateY(0);
      }

      to {
        transform: rotateX(-102deg) translateY(1px);
      }
    }

    @keyframes flipBottom {
      from {
        transform: rotateX(104deg) translateY(-1px);
      }

      to {
        transform: rotateX(0deg) translateY(0);
      }
    }

    @keyframes topShade {
      from {
        opacity: 0.18;
      }

      to {
        opacity: 0.42;
      }
    }

    @keyframes bottomShade {
      from {
        opacity: 0.45;
      }

      to {
        opacity: 0.08;
      }
    }

    @keyframes cardShadowPulse {
      0% {
        transform: translateX(-50%) scale(1);
        opacity: 0.92;
      }

      40% {
        transform: translateX(-50%) scale(1.03, 1.01);
        opacity: 1;
      }

      100% {
        transform: translateX(-50%) scale(1);
        opacity: 0.92;
      }
    }

    @keyframes signalFadeIn {
      0% {
        opacity: 0;
        filter: saturate(0.72) brightness(0.9);
      }

      100% {
        opacity: 1;
        filter: saturate(1.04) brightness(1.04);
      }
    }

    @keyframes signalFadeOut {
      0% {
        opacity: 1;
        filter: saturate(1.04) brightness(1.04);
      }

      100% {
        opacity: 0;
        filter: saturate(0.72) brightness(0.9);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="screen screen-forecast" data-screen="forecast">
      <section class="forecast">
        <div class="forecast-panel">
          <h1 class="title">下次月经预测</h1>
          <div class="calendar">
            <div class="calendar-inner">
              <div class="card" data-sequence='["12","01","02","03","04","05","06"]' data-steps="1" data-duration="500" data-type="number" data-suffix="月">
                <span class="card-shadow"></span>
                <span class="card-top"></span>
                <span class="card-depth"></span>
                <span class="card-bottom"></span>
                <span class="card-seam"></span>
                <span class="hinge-left"></span>
                <span class="hinge-right"></span>
                <div class="card-value card-display number">
                  <span class="value-main">12</span>
                  <span class="suffix">月</span>
                </div>
                <div class="flip-top">
                  <span class="card-top"></span>
                  <div class="card-value number">
                    <span class="value-main">12</span>
                    <span class="suffix">月</span>
                  </div>
                </div>
                <div class="flip-bottom">
                  <span class="card-bottom"></span>
                  <div class="card-value number">
                    <span class="value-main">01</span>
                    <span class="suffix">月</span>
                  </div>
                </div>
              </div>
              <div class="card" data-sequence='["22","23","24","25","26","27","28","29"]' data-steps="5" data-type="number" data-suffix="日">
                <span class="card-shadow"></span>
                <span class="card-top"></span>
                <span class="card-depth"></span>
                <span class="card-bottom"></span>
                <span class="card-seam"></span>
                <span class="hinge-left"></span>
                <span class="hinge-right"></span>
                <div class="card-value card-display number">
                  <span class="value-main">22</span>
                  <span class="suffix">日</span>
                </div>
                <div class="flip-top">
                  <span class="card-top"></span>
                  <div class="card-value number">
                    <span class="value-main">22</span>
                    <span class="suffix">日</span>
                  </div>
                </div>
                <div class="flip-bottom">
                  <span class="card-bottom"></span>
                  <div class="card-value number">
                    <span class="value-main">23</span>
                    <span class="suffix">日</span>
                  </div>
                </div>
              </div>
              <div class="card" data-sequence='["周日","周一","周二","周三","周四","周五","周六","周日"]' data-steps="2" data-type="week">
                <span class="card-shadow"></span>
                <span class="card-top"></span>
                <span class="card-depth"></span>
                <span class="card-bottom"></span>
                <span class="card-seam"></span>
                <span class="hinge-left"></span>
                <span class="hinge-right"></span>
                <div class="card-value card-display week">
                  <span class="value-main">周日</span>
                </div>
                <div class="flip-top">
                  <span class="card-top"></span>
                  <div class="card-value week">
                    <span class="value-main">周日</span>
                  </div>
                </div>
                <div class="flip-bottom">
                  <span class="card-bottom"></span>
                  <div class="card-value week">
                    <span class="value-main">周一</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <div class="pager">
        <button class="switch-button pager-button" type="button" data-target="forecast">经期日历</button>
        <button class="switch-button pager-button is-active" type="button" data-target="signal">经期信号灯</button>
      </div>
      <button class="play-button" type="button">播放</button>
    </section>

    <section class="screen screen-signal is-active" data-screen="signal">
      <section class="signal">
        <div class="signal-panel">
          <h1 class="signal-title">月经信号灯</h1>
          <div class="signal-grid">
            <div class="signal-item is-dim" data-signal="stable">
              <div class="signal-light">
                <span class="signal-light-off" style="background-image: url('./切图/默认.png?v=1784359573');"></span>
                <span class="signal-light-on" style="background-image: url('./切图/稳定.png?v=1784359573');"></span>
              </div>
              <div class="signal-name">稳定</div>
              <div class="signal-meta">21–35天</div>
            </div>
            <div class="signal-item is-dim" data-signal="mild">
              <div class="signal-light">
                <span class="signal-light-off" style="background-image: url('./切图/默认.png?v=1784359573');"></span>
                <span class="signal-light-on" style="background-image: url('./切图/轻度波动.png?v=1784359573');"></span>
              </div>
              <div class="signal-name">轻度波动</div>
              <div class="signal-meta">15–20或<br>36–90天</div>
            </div>
            <div class="signal-item is-dim" data-signal="strong">
              <div class="signal-light">
                <span class="signal-light-off" style="background-image: url('./切图/默认.png?v=1784359573');"></span>
                <span class="signal-light-on" style="background-image: url('./切图/明显波动.png?v=1784359573');"></span>
              </div>
              <div class="signal-name">明显波动</div>
              <div class="signal-meta">15–17天<br>46–90天</div>
            </div>
            <div class="signal-item is-dim" data-signal="watch">
              <div class="signal-light">
                <span class="signal-light-off" style="background-image: url('./切图/默认.png?v=1784359573');"></span>
                <span class="signal-light-on" style="background-image: url('./切图/建议关注.png?v=1784359573');"></span>
              </div>
              <div class="signal-name">建议关注</div>
              <div class="signal-meta">&lt;15天<br>&gt;90天</div>
            </div>
          </div>
        </div>
      </section>
      <div class="pager">
        <button class="switch-button pager-button" type="button" data-target="forecast">经期日历</button>
        <button class="switch-button pager-button is-active" type="button" data-target="signal">经期信号灯</button>
      </div>
      <div class="signal-controls">
        <div class="signal-color-row">
          <button class="signal-control" type="button" data-signal="stable" aria-label="稳定"></button>
          <button class="signal-control" type="button" data-signal="mild" aria-label="轻度波动"></button>
          <button class="signal-control" type="button" data-signal="strong" aria-label="明显波动"></button>
          <button class="signal-control" type="button" data-signal="watch" aria-label="建议关注"></button>
        </div>
        <div class="signal-reset-row">
          <button class="signal-control is-active" type="button" data-signal="off" aria-label="还原">还原</button>
        </div>
      </div>
    </section>
  </div>
  <script>
    const cards = Array.from(document.querySelectorAll(".card"));
    const playButtons = Array.from(document.querySelectorAll(".play-button"));
    const screens = Array.from(document.querySelectorAll(".screen"));
    const switchButtons = Array.from(document.querySelectorAll("[data-target]"));
    const signalItems = Array.from(document.querySelectorAll(".signal-item"));
    const signalControls = Array.from(document.querySelectorAll(".signal-control"));

    function setCardText(card, value) {
      const displayMain = card.querySelector(".card-display .value-main");
      displayMain.textContent = value;
    }

    function prepareFlip(card, currentValue, nextValue) {
      card.querySelector(".flip-top .value-main").textContent = currentValue;
      card.querySelector(".flip-bottom .value-main").textContent = nextValue;
    }

    function flipCard(card, duration = 300) {
      const sequence = JSON.parse(card.dataset.sequence);
      const currentIndex = Number(card.dataset.index || 0);
      const nextIndex = (currentIndex + 1) % sequence.length;
      const currentValue = sequence[currentIndex];
      const nextValue = sequence[nextIndex];

      prepareFlip(card, currentValue, nextValue);
      setCardText(card, nextValue);
      card.style.setProperty("--flip-half-duration", `${duration / 2}ms`);
      card.classList.remove("is-flipping");
      void card.offsetWidth;
      card.classList.add("is-flipping");

      return new Promise((resolve) => {
        setTimeout(() => {
          card.dataset.index = String(nextIndex);
          card.classList.remove("is-flipping");
          resolve();
        }, duration);
      });
    }

    function wait(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function runCardSteps(card, steps, totalDuration) {
      if (steps <= 0) {
        await wait(totalDuration);
        return;
      }

      const customDuration = Number(card.dataset.duration || 0);
      const perFlipDuration = customDuration || Math.max(120, Math.round(totalDuration / steps));

      for (let i = 0; i < steps; i += 1) {
        await flipCard(card, perFlipDuration);
      }
    }

    async function playFlip() {
      const activePlayButton = document.querySelector(".screen.is-active .play-button");
      if (activePlayButton) {
        activePlayButton.disabled = true;
      }
      const totalDuration = 1200;
      await Promise.all(
        cards.map((card) =>
          runCardSteps(card, Number(card.dataset.steps || 1), totalDuration)
        )
      );
      if (activePlayButton) {
        activePlayButton.disabled = false;
      }
    }

    function showScreen(target) {
      screens.forEach((screen) => {
        screen.classList.toggle("is-active", screen.dataset.screen === target);
      });

      switchButtons.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.target === target);
      });
    }

    playButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (!button.disabled) {
          playFlip();
        }
      });
    });

    switchButtons.forEach((button) => {
      button.addEventListener("click", () => {
        showScreen(button.dataset.target);
      });
    });

    function setActiveSignal(target, options = {}) {
      const { highlightText = true } = options;

      signalItems.forEach((item) => {
        const isActive = target !== "off" && item.dataset.signal === target;
        item.classList.toggle("is-dim", !isActive || !highlightText);
        item.classList.toggle("is-active", isActive);
        const lightOn = item.querySelector(".signal-light-on");
        if (isActive) {
          lightOn.style.animation = "none";
          void lightOn.offsetWidth;
          lightOn.style.animation = "";
        }
      });

      signalControls.forEach((button) => {
        button.classList.toggle("is-active", button.dataset.signal === target);
      });
    }

    let signalSequenceRunning = false;

    async function playSignalSequence(finalSignal) {
      if (signalSequenceRunning) {
        return;
      }

      signalSequenceRunning = true;
      const sequence = ["stable", "mild", "strong", "watch"];
      const finalIndex = sequence.indexOf(finalSignal);
      const leadInSequence = finalIndex >= 0 ? sequence.slice(0, finalIndex) : [];

      setActiveSignal("off");
      await wait(400);

      for (const signal of sequence) {
        setActiveSignal(signal, { highlightText: false });
        await wait(400);
      }

      for (const signal of sequence) {
        setActiveSignal(signal, { highlightText: false });
        await wait(400);
      }

      for (const signal of leadInSequence) {
        setActiveSignal(signal, { highlightText: false });
        await wait(400);
      }

      setActiveSignal(finalSignal);
      signalSequenceRunning = false;
    }

    signalControls.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.dataset.signal === "off") {
          setActiveSignal("off");
          signalSequenceRunning = false;
          return;
        }

        playSignalSequence(button.dataset.signal);
      });
    });
  </script>
</body>
</html>
